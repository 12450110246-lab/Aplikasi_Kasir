<!DOCTYPE html>
<html lang="id">
<head>
<title>Kasir Toko Modern</title>

<style>

/* Tampilan dasar halaman */
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

/* Judul */
h1{
text-align:center;
margin-bottom:30px;
}

/* Layout utama */
.container{
display:grid;
grid-template-columns:60% 40%;
gap:20px;
}

/* ================= PRODUK ================= */

.produk-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* Card produk */
.produk{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 10px rgba(0,0,0,0.5);
}

/* Animasi hover */
.produk:hover{
transform:scale(1.05);
background:#334155;
}

/* Gambar produk */
.produk img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

/* ================= KERANJANG ================= */

.keranjang{
background:#1e293b;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border-bottom:1px solid gray;
padding:8px;
text-align:center;
}

th{
background:#334155;
}

/* Total */
.total{
margin-top:15px;
font-size:20px;
}

/* Input pembayaran */
input{
padding:8px;
margin-top:10px;
width:100%;
border:none;
border-radius:5px;
}

/* Tombol */
button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* Tombol hapus */
.hapus{
background:#ef4444;
padding:5px 10px;
border:none;
border-radius:4px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🛒 Kasir Toko Modern</h1>

<div class="container">

<!-- ================= PRODUK ================= -->
<div class="produk-grid">

<!-- Produk 1 -->
<div class="produk" onclick="tambahProduk('Pensil',5000)">
<img src="c:\Users\ASUS\Pictures\pweb\2156138_988e514b-2e1c-46b8-ab6f-2e42ff607bb5_640_640.jpg~tplv-aphluv4xwc-resize-jpeg_700_0.jpg">
<h3>Pensil</h3>
<p>Rp 5000</p>
</div>

<!-- Produk 2 -->
<div class="produk" onclick="tambahProduk('Buku',12000)">
<img src="c:\Users\ASUS\Pictures\pweb\images.jpg">
<h3>Buku</h3>
<p>Rp 12000</p>
</div>

<!-- Produk 3 -->
<div class="produk" onclick="tambahProduk('Pulpen',8000)">
<img src="c:\Users\ASUS\Pictures\pweb\f5f765fd-659d-42e8-9332-e43e24ac59cd.jpg">
<h3>Pulpen</h3>
<p>Rp 8000</p>
</div>

<!-- Produk 4 -->
<div class="produk" onclick="tambahProduk('Penggaris',7000)">
<img src="c:\Users\ASUS\Pictures\pweb\images.png">
<h3>Penggaris</h3>
<p>Rp 7000</p>
</div>

<!-- Produk 5 -->
<div class="produk" onclick="tambahProduk('Penghapus',4000)">
<img src="c:\Users\ASUS\Pictures\pweb\images (1).jpg">
<h3>Penghapus</h3>
<p>Rp 4000</p>
</div>

<!-- Produk 6 -->
<div class="produk" onclick="tambahProduk('Spidol',15000)">
<img src="c:\Users\ASUS\Pictures\pweb\224205_960d4e0c-061e-4c40-ba76-ecee8b52b730_spidol-sno.jpg">
<h3>Spidol</h3>
<p>Rp 15000</p>
</div>

</div>

<!-- ================= KERANJANG ================= -->
<div class="keranjang">

<h2>Keranjang</h2>

<table>

<tr>
<th>Barang</th>
<th>Harga</th>
<th>Qty</th>
<th>Total</th>
<th>Aksi</th>
</tr>

<tbody id="cart"></tbody>

</table>

<div class="total">
Total Belanja: Rp <span id="total">0</span>
</div>

<!-- Input pembayaran -->
<input type="number" id="bayar" placeholder="Bayar">

<button onclick="hitungKembalian()">Kembalian</button>

<div class="total">
Kembalian: Rp <span id="kembalian">0</span>
</div>

</div>

</div>

<script>

/* Menyimpan data keranjang */
let cart = {};
let totalBelanja = 0;

/* Fungsi menambah produk ke keranjang */
function tambahProduk(nama,harga){

// Jika produk sudah ada maka jumlah bertambah
if(cart[nama]){
cart[nama].qty++;
}else{
cart[nama] = {harga:harga,qty:1};
}

renderCart();
}

/* Menampilkan keranjang */
function renderCart(){

let tabel = document.getElementById("cart");
tabel.innerHTML="";
totalBelanja = 0;

/* Loop data produk di keranjang */
for(let nama in cart){

let item = cart[nama];
let total = item.harga * item.qty;

totalBelanja += total;

/* Membuat baris tabel */
tabel.innerHTML += `
<tr>
<td>${nama}</td>
<td>${item.harga}</td>
<td>${item.qty}</td>
<td>${total}</td>
<td><button class="hapus" onclick="hapusItem('${nama}')">X</button></td>
</tr>
`;

}

/* Update total */
document.getElementById("total").innerText = totalBelanja;

}

/* Menghapus item */
function hapusItem(nama){

delete cart[nama];
renderCart();

}

/* Menghitung kembalian */
function hitungKembalian(){

let bayar = parseInt(document.getElementById("bayar").value);

let kembali = bayar - totalBelanja;

document.getElementById("kembalian").innerText = kembali;

}

</script>

</body>
</html>
